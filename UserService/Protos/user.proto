syntax = "proto3";

option csharp_namespace = "UserService.Grpc";

package users.v1;

// Represents the User service, responsible for user management and profiles
service UserService{
  // Create a user
  rpc CreateUser (CreateUserRequest) returns (UserResponse);
  // Retrieve an user information from his ID
  rpc GetUserById (GetUserByIdRequest) returns (UserResponse);
  // Retrieve an user information from his Email
  rpc GetUserByEmail (GetUserByEmailRequest) returns (UserResponse);
  // Updates an user profile
  rpc UpdateUserProfile (UpdateUserProfileRequest) returns (UserResponse);
  // Deactivate an user
  rpc DeactivateUser (DeactivateUserRequest) returns (DeactivateUserRequest);
  // Validate an user, checks if it exists
  rpc ValidateUser (ValidateUserRequest) returns (ValidateUserResponse);
}

message User{
  string id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  bool is_active = 5;
  string created_at = 6;
  string updated_at = 7;
}

message CreateUserRequest{
  string email = 1;
  string first_name = 2;
  string last_name = 3;
}

message GetUserByIdRequest{
  string id = 1;
}

message GetUserByEmailRequest{
  string email = 1;
}

message UpdateUserProfileRequest{
  string id = 1;
  string first_name = 2;
  string last_name = 3;
}

message DeactivateUserRequest{
  string id = 1;
}

message ValidateUserRequest {
  string id = 1;
}

message ValidateUserResponse{
  bool exists = 1;
  bool is_active = 2;
}

message UserResponse {
  User user = 1;
}

